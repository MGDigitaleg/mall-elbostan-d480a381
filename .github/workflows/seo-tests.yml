name: SEO Tests & Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  seohead-tests:
    name: SEOHead suite + coverage threshold
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Runs the full SEOHead test suite (rendering, hreflang/canonical,
      # JSON-LD ordering, schema validity) under v8 coverage. The thresholds
      # configured in vitest.config.ts will fail the job if SEOHead coverage
      # regresses — protecting the schema-merging logic from silent breakage.
      - name: Run SEOHead tests with coverage gate
        run: bun run test:seo
        env:
          CI: "true"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: seohead-coverage
          path: coverage/
          retention-days: 14
