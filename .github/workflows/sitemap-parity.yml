name: Sitemap Build & Parity Guard

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  sitemap-parity:
    name: prebuild → verify public/sitemap.xml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Runs scripts/build-sitemap.ts which:
      #   1. Cross-checks parity between edge function STATIC_ROUTES,
      #      App.tsx React Router routes, and robots.txt sections.
      #   2. Regenerates public/sitemap.xml from the single source of truth
      #      (the sections list inside supabase/functions/sitemap/index.ts).
      # The script exits non-zero on any drift.
      - name: Run prebuild (sitemap parity guard)
        run: bun run prebuild

      - name: Assert public/sitemap.xml exists & is well-formed
        run: |
          set -e
          test -s public/sitemap.xml
          echo "✓ sitemap.xml exists and is non-empty"
          # Quick well-formedness check using xmllint if available, else node
          if command -v xmllint >/dev/null 2>&1; then
            xmllint --noout public/sitemap.xml
          else
            node -e "
              const fs = require('fs');
              const xml = fs.readFileSync('public/sitemap.xml', 'utf8');
              if (!/^<\?xml/.test(xml.trim())) { console.error('Missing XML declaration'); process.exit(1); }
              if (!/<sitemapindex[\s>]/.test(xml)) { console.error('Missing <sitemapindex>'); process.exit(1); }
              if (!/<\/sitemapindex>\s*$/.test(xml)) { console.error('Unclosed <sitemapindex>'); process.exit(1); }
              const count = (xml.match(/<sitemap>/g) || []).length;
              if (count === 0) { console.error('No <sitemap> entries'); process.exit(1); }
              console.log('✓ sitemap.xml well-formed with', count, 'sections');
            "
          fi

      # Re-running prebuild must produce the *same* file. If the committed
      # public/sitemap.xml drifts from what the source of truth generates,
      # this diff fails the build (ignoring the auto-updated lastmod date).
      - name: Verify committed sitemap.xml matches generated output
        run: |
          set -e
          # Normalize lastmod to a fixed value for comparison
          sed -E 's#<lastmod>[0-9]{4}-[0-9]{2}-[0-9]{2}</lastmod>#<lastmod>DATE</lastmod>#g' public/sitemap.xml > /tmp/generated.xml
          git show HEAD:public/sitemap.xml \
            | sed -E 's#<lastmod>[0-9]{4}-[0-9]{2}-[0-9]{2}</lastmod>#<lastmod>DATE</lastmod>#g' \
            | sed -E 's#Generated: [0-9]{4}-[0-9]{2}-[0-9]{2}#Generated: DATE#g' > /tmp/committed.xml
          sed -i -E 's#Generated: [0-9]{4}-[0-9]{2}-[0-9]{2}#Generated: DATE#g' /tmp/generated.xml
          if ! diff -u /tmp/committed.xml /tmp/generated.xml; then
            echo "✖ public/sitemap.xml is out of date — run \`bun run prebuild\` and commit."
            exit 1
          fi
          echo "✓ committed sitemap.xml matches generator output"
      # Validate every per-section sitemap-*.xml file:
      #   1. Exists and is non-empty
      #   2. Has a real <urlset> root (NOT a nested <sitemapindex>, which
      #      Google rejects — this was the bug that caused 0 indexed pages).
      #   3. Is well-formed XML
      #   4. Every <loc> entry in sitemap.xml points to an existing file
      - name: Validate per-section sitemap-*.xml files
        run: |
          set -e
          node -e "
            const fs = require('fs');
            const path = require('path');
            const indexXml = fs.readFileSync('public/sitemap.xml', 'utf8');
            const locs = [...indexXml.matchAll(/<loc>([^<]+)<\/loc>/g)].map(m => m[1]);
            if (locs.length === 0) { console.error('✖ sitemap.xml has no <loc> entries'); process.exit(1); }
            let failed = 0;
            for (const url of locs) {
              const file = url.replace(/^https?:\/\/[^/]+\//, '');
              const fp = path.join('public', file);
              if (!fs.existsSync(fp)) {
                console.error('  ✖', file, '— missing in /public');
                failed++; continue;
              }
              const xml = fs.readFileSync(fp, 'utf8');
              if (!xml.trim().startsWith('<?xml')) {
                console.error('  ✖', file, '— missing XML declaration');
                failed++; continue;
              }
              if (/<sitemapindex\b/i.test(xml)) {
                console.error('  ✖', file, '— nested <sitemapindex> (Google rejects this)');
                failed++; continue;
              }
              if (!/<urlset\b/i.test(xml)) {
                console.error('  ✖', file, '— root must be <urlset>');
                failed++; continue;
              }
              if (!/<\/urlset>\s*$/i.test(xml)) {
                console.error('  ✖', file, '— unclosed <urlset>');
                failed++; continue;
              }
              const urls = (xml.match(/<url>/g) || []).length;
              console.log('  ✓', file, '—', urls, 'URLs');
            }
            if (failed > 0) { console.error('\n✖', failed, 'sitemap file(s) failed validation'); process.exit(1); }
            console.log('\n✓ All', locs.length, 'sitemap-*.xml files valid (urlset root, no nesting).');
          "

      # Validate robots.txt:
      #   1. Every "Sitemap:" entry points to a file that exists in /public
      #   2. Every per-section sitemap-*.xml that exists in /public is
      #      referenced by robots.txt (no orphan files invisible to crawlers)
      #   3. The sitemap index (sitemap.xml) is listed
      - name: Validate robots.txt sitemap entries
        run: |
          set -e
          node -e "
            const fs = require('fs');
            const path = require('path');
            const robots = fs.readFileSync('public/robots.txt', 'utf8');
            const entries = [...robots.matchAll(/^Sitemap:\s*(\S+)/gm)].map(m => m[1]);
            if (entries.length === 0) { console.error('✖ robots.txt has no Sitemap: entries'); process.exit(1); }

            const referenced = new Set();
            let failed = 0;
            for (const url of entries) {
              const file = url.replace(/^https?:\/\/[^/]+\//, '');
              const fp = path.join('public', file);
              if (!fs.existsSync(fp)) {
                console.error('  ✖', url, '— file not found at public/' + file);
                failed++; continue;
              }
              referenced.add(file);
              console.log('  ✓', file);
            }

            if (!referenced.has('sitemap.xml')) {
              console.error('  ✖ robots.txt missing index entry: sitemap.xml');
              failed++;
            }

            // Find orphan sitemap-*.xml files in /public not listed in robots.txt
            const onDisk = fs.readdirSync('public').filter(f => /^sitemap-[a-z0-9-]+\.xml$/i.test(f));
            const orphans = onDisk.filter(f => !referenced.has(f) && f !== 'sitemap-main.xml');
            for (const f of orphans) {
              console.error('  ✖ orphan file (in /public but not in robots.txt):', f);
              failed++;
            }

            if (failed > 0) { console.error('\n✖', failed, 'robots.txt issue(s)'); process.exit(1); }
            console.log('\n✓ robots.txt: all', entries.length, 'Sitemap entries resolve and no orphans.');
          "

      # For every <loc> in sitemap-*.xml, verify the path matches a real
      # React Router route (static or :param pattern). Catches dead URLs
      # that would 404 after deploy because the page does not exist.
      - name: Validate every sitemap URL maps to a React Router route
        run: bun scripts/verify-sitemap-routes.ts

      # Always-run summary report (does not fail the build). Renders a
      # markdown table per file with URL count, root, well-formedness, and
      # any drift — uploaded as an artifact and surfaced in the job summary.
      - name: Generate sitemap report
        if: always()
        run: bun scripts/sitemap-report.ts

      - name: Publish report to GitHub job summary
        if: always()
        run: |
          if [ -f reports/sitemap-report.md ]; then
            cat reports/sitemap-report.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload sitemap report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sitemap-report
          path: reports/sitemap-report.md
          retention-days: 30

      - name: Upload generated sitemap as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sitemap-xml
          path: public/sitemap.xml
          retention-days: 14
